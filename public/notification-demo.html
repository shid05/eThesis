<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Notification Component</title>

  <!--
    ==============================================================
    STICKY NOTIFICATION COMPONENT
    --------------------------------------------------------------
    A self-contained, responsive notification system built with
    plain HTML, CSS and JavaScript. Drop the <style> + <script>
    blocks into any page to use it.

    Public API:
      Notify.show({ title, message, type, id })
      Notify.dismiss(id)       // dismiss a specific notification
      Notify.dismissAll()      // dismiss every notification

    Types: 'success' | 'error' | 'warning' | 'info'
    ==============================================================
  -->

  <style>
    /* ----------------------------------------------------------
       Theme tokens — tweak these to re-skin the component.
       ---------------------------------------------------------- */
    :root {
      --notif-radius: 12px;
      --notif-shadow: 0 10px 30px rgba(15, 23, 42, 0.12),
                      0 2px 6px rgba(15, 23, 42, 0.06);
      --notif-bg: #ffffff;
      --notif-text: #0f172a;
      --notif-muted: #475569;
      --notif-border: rgba(15, 23, 42, 0.06);

      --notif-success: #16a34a;
      --notif-error:   #dc2626;
      --notif-warning: #d97706;
      --notif-info:    #2563eb;

      --notif-anim: 280ms cubic-bezier(0.22, 1, 0.36, 1);
      --notif-z: 9999;
    }

    /* Demo-page styling (not part of the component) ------------ */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: #0f172a;
      min-height: 200vh; /* tall page so we can verify sticky behaviour */
      padding: 48px 24px;
    }
    .demo {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
    }
    .demo h1 { margin-top: 0; }
    .demo p  { color: #475569; line-height: 1.6; }
    .demo-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .demo-buttons button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: transform 120ms ease, opacity 120ms ease;
    }
    .demo-buttons button:hover    { transform: translateY(-1px); opacity: 0.92; }
    .demo-buttons .btn-success    { background: var(--notif-success); }
    .demo-buttons .btn-error      { background: var(--notif-error); }
    .demo-buttons .btn-warning    { background: var(--notif-warning); }
    .demo-buttons .btn-info       { background: var(--notif-info); }
    .demo-buttons .btn-clear      { background: #475569; }

    /* ----------------------------------------------------------
       Notification stack container
       Fixed to the viewport so it stays visible while scrolling.
       ---------------------------------------------------------- */
    .notif-stack {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 360px;
      max-width: calc(100vw - 40px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: var(--notif-z);
      pointer-events: none; /* clicks pass through empty space */
    }

    /* ----------------------------------------------------------
       Single notification card
       ---------------------------------------------------------- */
    .notif {
      pointer-events: auto;
      position: relative;
      display: grid;
      grid-template-columns: 4px 1fr auto;
      gap: 14px;
      align-items: flex-start;
      padding: 14px 14px 14px 0;
      background: var(--notif-bg);
      color: var(--notif-text);
      border: 1px solid var(--notif-border);
      border-radius: var(--notif-radius);
      box-shadow: var(--notif-shadow);
      overflow: hidden;

      /* Initial (hidden) state for slide + fade in */
      opacity: 0;
      transform: translateX(120%);
      transition: opacity var(--notif-anim),
                  transform var(--notif-anim);
    }

    /* Visible state — toggled by JS once the element is in the DOM */
    .notif.is-visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* Leaving state — fade + slide out before removal */
    .notif.is-leaving {
      opacity: 0;
      transform: translateX(120%);
    }

    /* Coloured accent strip on the left side, set per type */
    .notif__accent {
      width: 4px;
      align-self: stretch;
      background: var(--notif-info);
    }

    .notif__body {
      min-width: 0; /* allow text to wrap inside grid cell */
    }
    .notif__title {
      margin: 0 0 4px 0;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }
    .notif__message {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--notif-muted);
      word-wrap: break-word;
    }

    /* Close button */
    .notif__close {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--notif-muted);
      border-radius: 6px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background-color 150ms ease,
                  color 150ms ease,
                  transform 150ms ease;
    }
    .notif__close:hover {
      background-color: rgba(15, 23, 42, 0.06);
      color: var(--notif-text);
      transform: scale(1.05);
    }
    .notif__close:focus-visible {
      outline: 2px solid var(--notif-info);
      outline-offset: 2px;
    }

    /* ----------------------------------------------------------
       Type variants — each sets the accent strip colour and
       a subtle tinted left border.
       ---------------------------------------------------------- */
    .notif--success .notif__accent { background: var(--notif-success); }
    .notif--error   .notif__accent { background: var(--notif-error);   }
    .notif--warning .notif__accent { background: var(--notif-warning); }
    .notif--info    .notif__accent { background: var(--notif-info);    }

    .notif--success .notif__title { color: var(--notif-success); }
    .notif--error   .notif__title { color: var(--notif-error);   }
    .notif--warning .notif__title { color: var(--notif-warning); }
    .notif--info    .notif__title { color: var(--notif-info);    }

    /* ----------------------------------------------------------
       Responsive: on mobile, stretch full width and center.
       ---------------------------------------------------------- */
    @media (max-width: 600px) {
      .notif-stack {
        top: 12px;
        right: 12px;
        left: 12px;
        width: auto;
        max-width: none;
      }
      .notif {
        /* Animate from the top on mobile rather than the side */
        transform: translateY(-120%);
      }
      .notif.is-leaving {
        transform: translateY(-120%);
      }
      .notif__title   { font-size: 14px; }
      .notif__message { font-size: 13px; }
    }

    /* Accessibility: respect reduced-motion preference */
    @media (prefers-reduced-motion: reduce) {
      .notif {
        transition: opacity 120ms linear;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Demo-only content ---------------------------------------------- -->
  <div class="demo">
    <h1>Sticky Notification Demo</h1>
    <p>
      Click any button below to fire a notification. They appear in the
      top-right on desktop and full-width at the top on mobile. Scroll
      the page — they stay visible because the container is
      <code>position: fixed</code>.
    </p>
    <div class="demo-buttons">
      <button class="btn-success" onclick="Notify.show({ type:'success', title:'Thesis approved', message:'Your thesis submission has been approved by the reviewer.' })">Success</button>
      <button class="btn-error"   onclick="Notify.show({ type:'error',   title:'Upload failed',   message:'We couldn’t upload the thesis file. Please try again.' })">Error</button>
      <button class="btn-warning" onclick="Notify.show({ type:'warning', title:'Pending review',  message:'Your thesis is awaiting reviewer action.' })">Warning</button>
      <button class="btn-info"    onclick="Notify.show({ type:'info',    title:'New message',     message:'A reviewer left a comment on your thesis.' })">Info</button>
      <button class="btn-clear"   onclick="Notify.dismissAll()">Dismiss all</button>
    </div>
  </div>

  <!-- Notification stack — JS appends notifications here ------------- -->
  <div id="notif-stack"
       class="notif-stack"
       role="region"
       aria-label="Notifications"
       aria-live="polite"></div>

  <script>
    /* ==============================================================
       Notify — tiny notification controller
       --------------------------------------------------------------
       Notifications are NOT auto-dismissed; users must click ×
       (or call Notify.dismiss / Notify.dismissAll programmatically).
       ============================================================== */
    const Notify = (() => {
      const stack = document.getElementById('notif-stack');
      const ALLOWED_TYPES = ['success', 'error', 'warning', 'info'];

      // Generate a unique id when the caller doesn't provide one.
      const uid = () => 'n_' + Math.random().toString(36).slice(2, 9);

      // Tiny HTML escape so user-supplied strings render safely.
      const escape = (str) =>
        String(str ?? '').replace(/[&<>"']/g, (ch) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;',
          '"': '&quot;', "'": '&#39;'
        }[ch]));

      function show({ title = '', message = '', type = 'info', id } = {}) {
        const safeType = ALLOWED_TYPES.includes(type) ? type : 'info';
        const notifId  = id || uid();

        const el = document.createElement('div');
        el.className = `notif notif--${safeType}`;
        el.dataset.id = notifId;
        el.setAttribute('role', safeType === 'error' ? 'alert' : 'status');

        el.innerHTML = `
          <span class="notif__accent" aria-hidden="true"></span>
          <div class="notif__body">
            ${title ? `<p class="notif__title">${escape(title)}</p>` : ''}
            ${message ? `<p class="notif__message">${escape(message)}</p>` : ''}
          </div>
          <button type="button"
                  class="notif__close"
                  aria-label="Dismiss notification">&times;</button>
        `;

        el.querySelector('.notif__close')
          .addEventListener('click', () => dismiss(notifId));

        stack.appendChild(el);

        // Trigger the slide+fade in on the next frame so the
        // transition runs (the element starts in the hidden state).
        requestAnimationFrame(() => el.classList.add('is-visible'));

        return notifId;
      }

      function dismiss(id) {
        const el = stack.querySelector(`.notif[data-id="${id}"]`);
        if (!el) return;
        el.classList.remove('is-visible');
        el.classList.add('is-leaving');

        // Remove from DOM after the transition completes.
        const cleanup = () => el.remove();
        el.addEventListener('transitionend', cleanup, { once: true });
        // Safety net in case transitionend doesn't fire
        // (e.g. tab in background, reduced-motion).
        setTimeout(cleanup, 400);
      }

      function dismissAll() {
        stack.querySelectorAll('.notif').forEach((el) => dismiss(el.dataset.id));
      }

      return { show, dismiss, dismissAll };
    })();

    // Expose globally for inline handlers in the demo above.
    window.Notify = Notify;
  </script>
</body>
</html>
